---
- name: "Install kitty-terminfo package"
  hosts: all

  vars:
    packages_to_install: ["kitty-terminfo"]

  tasks:
    - name: "Gather facts"
      ansible.builtin.import_role:
        name: my.homelab.facts

    - name: "Install kitty-terminfo"
      ansible.builtin.import_role:
        name: my.homelab.package_manager
        tasks_from: install-packages.yml
