---
## install, uninstall, update, restart, stop
coolify_action: "install"

## Deployment modes
# production, homelab, vps
coolify_mode: "production"

## Core settings
coolify_port: "{{ 8000 if coolify_mode == 'production' else 8080 }}"
coolify_firewall_enabled: "{{ coolify_mode == 'production' }}"
coolify_lan_subnet: "192.168.1.0/24"

## Post-install overrides
coolify_docker_pool_base: "172.20.0.0/16"
coolify_autoupdate: false

## Production settings
coolify_root_username: "admin"
coolify_root_email: "admin@{{ ansible_fqdn | default('local.lan') }}"

## Homelab settings
coolify_homelab_domain: "coolify.local.lan"
coolify_homelab_skip_firewall: true

## Uninstall behavior
coolify_nuke: false
