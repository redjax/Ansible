---
- name: Install prerequisites
  package:
    name: curl
    state: present
  become: true

- name: Run Coolify installer
  shell: |
    curl -fsSL https://cdn.coolify.io/install.sh | bash || true
  become: true
  environment:
    DOCKER_POOL_FORCE_OVERRIDE: "true"

- name: Wait for Coolify docker-compose.yml to be created
  wait_for:
    path: /data/coolify/docker-compose.yml
    state: present
    timeout: 60
  become: true
  register: compose_wait
  retries: 12
  delay: 5
  until: compose_wait is succeeded

- name: Apply post-install overrides
  include_tasks: post-install.yml
